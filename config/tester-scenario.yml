udp:
  host: 127.0.0.1
  port: 5001

listener:
  enabled: true
  port: 7001
  durationSeconds: 120
  bufferSizeBytes: 65507

messages:
  - mode: FRUIT_ORANGE
    target:
      host: 127.0.0.1
      port: 5001
    fruit:
      sourceFarm: "north-farm-17"
      freshness: "very_fresh"

  - mode: FRUIT_BANANA
    target:
      host: 127.0.0.1
      port: 5001
    fruit:
      color: "yellow"
      weight: 142.75

  - mode: WEATHER_TEMPERATURE_READING
    target:
      host: 127.0.0.1
      port: 5003
    weather:
      stationId: "station-tlv-01"
      temperatureCelsius: 28.4
      condition: "sunny"

repeat: 10000
intervalMillis: 1000
