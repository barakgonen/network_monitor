udp:
  host: 127.0.0.1
  port: 5050

listener:
  enabled: true
  port: 7001
  durationSeconds: 120
  bufferSizeBytes: 65507

messages:
  - mode: HEX
    target:
      host: 127.0.0.1
      port: 5001
    hex: "00010203040506070809"

repeat: 1000
intervalMillis: 1000
reader:
  interfaces:
    - name: BG First Reflection
      enabled: true
      protocol: UDP
      port: 7001
      byteOrder: BIG_ENDIAN
      headerType: com.example.schemas.rada.struct.RadaHeader
      opcodeFieldName: msgType
      supportedMessages:
        "1":
          messageClass: com.example.schemas.rada.messages.RadaExtendedStatus
          displayName: RadaExtendedStatus
        "2":
          messageClass: com.example.schemas.rada.messages.RadaExtendedStatusMrs
          displayName: RadaExtendedStatusMrs
        "3":
          messageClass: com.example.schemas.rada.messages.RadaStatus
          displayName: RadaStatus
        "4":
          messageClass: com.example.schemas.rada.messages.RadaTracksExtended
          displayName: RadaTracksExtended