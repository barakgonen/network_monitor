udp:
  host: 127.0.0.1
  port: 5001

listener:
  enabled: true
  port: 7001
  durationSeconds: 120
  bufferSizeBytes: 65507

messages:
  - mode: FRUIT_ORANGE
    target:
      host: 127.0.0.1
      port: 5001
    fruit:
      sourceFarm: "north-farm-17"
      freshness: "very_fresh"

  - mode: FRUIT_BANANA
    target:
      host: 127.0.0.1
      port: 5001
    fruit:
      color: "yellow"
      weight: 142.75

  - mode: WEATHER_TEMPERATURE_READING
    target:
      host: 127.0.0.1
      port: 5003
    weather:
      stationId: "station-tlv-01"
      temperatureCelsius: 28.4
      condition: "sunny"

  - mode: PING
    target:
      host: 127.0.0.1
      port: 5001
    ping:
      sequence: 1

  - mode: CANDY
    target:
      host: 127.0.0.1
      port: 5001
      transport: TCP
    candy:
      name: "chocolate-bar"
      calories: 250.5

  - mode: RADA_STATUS
    target:
      host: 127.0.0.1
      port: 5050

repeat: 1231
intervalMillis: 1000
