server:
  port: 8080

traffic:
  udp:
    enabled: true
    fruit-port: 5001
    weather-port: 5003
    buffer-size-bytes: 65507

  reflection-interfaces:
    - name: Reflection Fruit Interface
      enabled: true
      protocol: UDP
      port: 5050
      byte-order: BIG_ENDIAN
      header-type: com.example.schemas.fruit.FruitProtocolHeader
      opcode-field-name: opcode
      supported-messages:
        "1001":
          message-class: com.example.schemas.reflectiondemo.ReflectionOrangeMessage
          display-name: Orange
        "1002":
          message-class: com.example.schemas.reflectiondemo.ReflectionBananaMessage
          display-name: Banana

    - name: Reflection Weather Interface
      enabled: true
      protocol: UDP
      port: 5051
      byte-order: BIG_ENDIAN
      header-type: com.example.schemas.weather.WeatherProtocolHeader
      opcode-field-name: opcode
      supported-messages:
        "2001":
          message-class: com.example.schemas.reflectiondemo.ReflectionTemperatureReadingMessage
          display-name: TemperatureReading

  store:
    max-size: 500
