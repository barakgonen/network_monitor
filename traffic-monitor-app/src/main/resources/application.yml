server:
  port: 8080

traffic:
  interface-active-window-seconds: 10

  udp:
    buffer-size-bytes: 65507

  # Put your own protocol classes here.
  #
  # Example:
  #
  # reflection-interfaces:
  #   - name: Rada Interface
  #     enabled: true
  #     protocol: UDP
  #     port: 5050
  #     byte-order: BIG_ENDIAN
  #     header-type: com.example.schemas.rada.struct.RadaHeader
  #     opcode-field-name: msgType
  #     supported-messages:
  #       "4444":
  #         message-class: com.example.schemas.rada.messages.RadaExtendedStatus
  #         display-name: RadaExtendedStatus
  #
  reflection-interfaces: []

  store:
    max-size: 500
