<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Traffic Monitor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f8fafc;
      color: #0f172a;
    }

    h1 {
      margin-bottom: 4px;
    }

    .subtitle {
      color: #64748b;
      margin-bottom: 24px;
    }

    button {
      padding: 8px 12px;
      border: 1px solid #cbd5e1;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
    }

    th, td {
      border-bottom: 1px solid #e2e8f0;
      padding: 10px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f1f5f9;
    }

    code {
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Traffic Monitor</h1>
  <div class="subtitle">Initial UDP monitoring view</div>

  <button onclick="loadMessages()">Refresh</button>

  <table>
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>Protocol</th>
        <th>Local Port</th>
        <th>Remote Address</th>
        <th>Size</th>
        <th>Payload Text</th>
        <th>Payload Base64</th>
      </tr>
    </thead>
    <tbody id="messages"></tbody>
  </table>

  <script>
    async function loadMessages() {
      const response = await fetch('/api/messages/recent');
      const messages = await response.json();

      const tbody = document.getElementById('messages');
      tbody.innerHTML = '';

      for (const msg of messages) {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${msg.timestamp}</td>
          <td>${msg.transportProtocol}</td>
          <td>${msg.localPort}</td>
          <td>${msg.remoteAddress}</td>
          <td>${msg.payloadSizeBytes}</td>
          <td><code>${escapeHtml(msg.payloadText || '')}</code></td>
          <td><code>${escapeHtml(msg.payloadBase64 || '')}</code></td>
        `;
        tbody.appendChild(row);
      }
    }

    function escapeHtml(value) {
      return value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    loadMessages();
    setInterval(loadMessages, 2000);
  </script>
</body>
</html>
